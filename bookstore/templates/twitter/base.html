<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Twitter Clone{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #15202b; color: #fff; min-height: 100vh; }
        a { color: #1d9bf0; text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* Layout */
        .layout { display: flex; max-width: 1200px; margin: 0 auto; }
        .sidebar { width: 260px; padding: 20px; position: sticky; top: 0; height: 100vh; border-right: 1px solid #38444d; }
        .main { flex: 1; max-width: 600px; border-right: 1px solid #38444d; }

        /* Sidebar */
        .logo { font-size: 28px; font-weight: bold; color: #1d9bf0; margin-bottom: 30px; display: block; }
        .nav-item { display: flex; align-items: center; gap: 16px; padding: 12px 16px; border-radius: 30px; margin-bottom: 4px; font-size: 18px; color: #fff; cursor: pointer; transition: background 0.2s; }
        .nav-item:hover { background: #1c2938; text-decoration: none; }
        .nav-item.active { font-weight: bold; }

        /* Header */
        .header { padding: 16px 20px; border-bottom: 1px solid #38444d; font-size: 20px; font-weight: bold; position: sticky; top: 0; background: rgba(21,32,43,0.9); backdrop-filter: blur(10px); z-index: 10; }

        /* Tweet box */
        .tweet-box { padding: 16px 20px; border-bottom: 1px solid #38444d; display: flex; gap: 12px; }
        .avatar { width: 48px; height: 48px; border-radius: 50%; background: #1d9bf0; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; flex-shrink: 0; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .tweet-box textarea { flex: 1; background: transparent; border: none; color: #fff; font-size: 18px; resize: none; outline: none; font-family: inherit; min-height: 80px; }
        .tweet-box textarea::placeholder { color: #6e767d; }
        .tweet-box-footer { display: flex; justify-content: flex-end; padding-top: 12px; border-top: 1px solid #38444d; margin-top: 12px; }
        .btn { padding: 10px 20px; border-radius: 20px; border: none; cursor: pointer; font-weight: bold; font-size: 14px; transition: background 0.2s; }
        .btn-primary { background: #1d9bf0; color: #fff; }
        .btn-primary:hover { background: #1a8cd8; }
        .btn-outline { background: transparent; color: #1d9bf0; border: 1px solid #1d9bf0; }
        .btn-outline:hover { background: rgba(29,155,240,0.1); }
        .btn-danger { background: transparent; color: #f4212e; border: 1px solid #f4212e; font-size: 13px; padding: 6px 14px; }
        .btn-danger:hover { background: rgba(244,33,46,0.1); }
        .btn-sm { padding: 6px 14px; font-size: 13px; }

        /* Tweet card */
        .tweet { padding: 16px 20px; border-bottom: 1px solid #38444d; display: flex; gap: 12px; transition: background 0.2s; }
        .tweet:hover { background: #1c2938; }
        .tweet-content { flex: 1; }
        .tweet-author { font-weight: bold; margin-right: 8px; color: #fff; }
        .tweet-username { color: #6e767d; font-size: 14px; }
        .tweet-text { margin-top: 4px; line-height: 1.5; word-break: break-word; }
        .tweet-actions { display: flex; gap: 24px; margin-top: 12px; }
        .tweet-action { display: flex; align-items: center; gap: 6px; color: #6e767d; font-size: 13px; cursor: pointer; background: none; border: none; padding: 4px 8px; border-radius: 20px; transition: all 0.2s; }
        .tweet-action:hover { color: #1d9bf0; background: rgba(29,155,240,0.1); }
        .tweet-action.liked { color: #f91880; }
        .tweet-action.liked:hover { color: #f91880; background: rgba(249,24,128,0.1); }
        .tweet-time { color: #6e767d; font-size: 13px; margin-top: 4px; }

        /* Tabs */
        .tabs { display: flex; border-bottom: 1px solid #38444d; }
        .tab { flex: 1; text-align: center; padding: 16px; cursor: pointer; font-weight: bold; color: #6e767d; border-bottom: 2px solid transparent; transition: all 0.2s; }
        .tab.active { color: #fff; border-bottom: 2px solid #1d9bf0; }
        .tab:hover { background: #1c2938; }

        /* Auth forms */
        .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-box { width: 400px; padding: 40px; }
        .auth-logo { font-size: 48px; color: #1d9bf0; text-align: center; margin-bottom: 30px; font-weight: bold; }
        .auth-title { font-size: 28px; font-weight: bold; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 6px; color: #6e767d; font-size: 14px; }
        .form-control { width: 100%; padding: 14px 16px; background: transparent; border: 1px solid #38444d; border-radius: 4px; color: #fff; font-size: 16px; outline: none; transition: border 0.2s; font-family: inherit; }
        .form-control:focus { border-color: #1d9bf0; }
        .auth-link { text-align: center; margin-top: 20px; color: #6e767d; }

        /* Profile */
        .profile-header { padding: 20px; border-bottom: 1px solid #38444d; }
        .profile-banner { height: 160px; background: linear-gradient(135deg, #1d9bf0, #0d47a1); border-radius: 8px; margin-bottom: 12px; }
        .profile-info { display: flex; justify-content: space-between; align-items: flex-start; }
        .profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: #1d9bf0; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; border: 4px solid #15202b; overflow: hidden; }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .profile-name { font-size: 22px; font-weight: bold; margin-top: 8px; }
        .profile-handle { color: #6e767d; margin-bottom: 8px; }
        .profile-bio { color: #e7e9ea; margin-bottom: 12px; }
        .profile-stats { display: flex; gap: 20px; }
        .profile-stat { color: #6e767d; font-size: 14px; }
        .profile-stat span { color: #fff; font-weight: bold; }

        /* Edit profile form */
        .edit-form { padding: 20px; border-bottom: 1px solid #38444d; }
        .edit-form h3 { margin-bottom: 16px; font-size: 18px; }

        /* Messages */
        .messages { padding: 12px 20px; }
        .message { padding: 10px 16px; border-radius: 8px; margin-bottom: 8px; font-size: 14px; }
        .message.error { background: rgba(244,33,46,0.2); border: 1px solid #f4212e; color: #f4212e; }
        .message.success { background: rgba(0,186,124,0.2); border: 1px solid #00ba7c; color: #00ba7c; }

        /* Comments */
        .comment { padding: 10px 20px; border-bottom: 1px solid #2f3336; display: flex; gap: 10px; }
        .comment-content { flex: 1; font-size: 14px; }
        .comment-author { font-weight: bold; margin-right: 6px; }
        .comment-text { color: #e7e9ea; }
        .comment-form { padding: 12px 20px; border-bottom: 1px solid #38444d; display: flex; gap: 10px; }
        .comment-form input { flex: 1; background: #2f3336; border: none; border-radius: 20px; padding: 10px 16px; color: #fff; font-size: 14px; outline: none; }
        .comment-form input::placeholder { color: #6e767d; }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { max-width: 100%; border: none; }
        }
    </style>
</head>
<body>
    {% if user.is_authenticated %}
    <div class="layout">
        <nav class="sidebar">
            <span class="logo">𝕏</span>
            <a href="{% url 'feed' %}" class="nav-item {% if request.resolver_match.url_name == 'feed' %}active{% endif %}">
                🏠 Início
            </a>
            <a href="{% url 'profile' %}" class="nav-item {% if request.resolver_match.url_name == 'profile' %}active{% endif %}">
                👤 Perfil
            </a>
            <a href="{% url 'logout' %}" class="nav-item">🚪 Sair</a>
        </nav>
        <main class="main">
            {% if messages %}
            <div class="messages">
                {% for message in messages %}
                <div class="message {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
            {% endif %}
            {% block content %}{% endblock %}
        </main>
    </div>
    {% else %}
        {% block auth_content %}{% endblock %}
    {% endif %}
</body>
</html>
